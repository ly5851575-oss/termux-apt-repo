name: CI

on:
  push:
    branches:
      - feat/secctl-command-center
  pull_request:
    branches:
      - feat/secctl-command-center

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Termux environment (mock)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bash
          # Mock Termux environment for testing
          mkdir -p $HOME/.termux
          echo "PREFIX=/data/data/com.termux/files/usr" > $HOME/.termux/termux.properties
          export PREFIX=/data/data/com.termux/files/usr
          mkdir -p $PREFIX/bin
          mkdir -p $PREFIX/tmp
          mkdir -p $PREFIX/var/log
          # Mock nethunter command
          echo '#!/bin/bash\nif [[ "$1" == "-r" && "$2" == "printf NH_BOOT_OK" ]]; then echo "NH_BOOT_OK"; else exec "$@"; fi' | sudo tee $PREFIX/bin/nethunter > /dev/null
          sudo chmod +x $PREFIX/bin/nethunter
          # Mock termux-info
          echo '#!/bin/bash\necho "Updatable packages: 0\nPackages installed: 100\nLast update: 2023-01-01 12:00:00\nTermux version: 0.118\nKernel version: 5.10.0\nAndroid version: 11\nDevice model: Generic\nCPU architecture: aarch64"' | sudo tee $PREFIX/bin/termux-info > /dev/null
          sudo chmod +x $PREFIX/bin/termux-info

      - name: Run existing checks
        run: bash nethunter-setup/tests/check.sh
      - name: Run secctl tests
        run: bash nethunter-setup/tests/secctl_tests.sh
